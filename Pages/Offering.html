<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offerings | Treasury SPUC</title>
  <link rel="stylesheet" href="../Styles/Offering.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="logo-area">
      <img src="../Assets/logo.png" alt="Logo" class="logo-img"/>
      <div class="org-name">
        <strong>Southwestern Philippine</strong> Union Conference
      </div>
    </div>
  </header>

  <main>
    <div class="title-row">
      <p class="page-subtitle">Southwestern Philippine Union Conference</p>
      <h1 class="page-title">OFFERINGS</h1>
    </div>

    <div class="chart-card">
      <div class="chart-table-row">
        <div class="chart-scroll">
          <canvas id="offeringChart"></canvas>
        </div>
        <div class="right-col">
          <div class="chart-legend" id="chartLegend"></div>
          <div class="excel-table-wrap">
            <table class="excel-table">
              <thead><tr>
                <th class="th-offerings">OFFERINGS</th>
                <th class="th-2025">2025</th>
                <th class="th-2026">2026</th>
                <th class="th-budget">BUDGET</th>
              </tr></thead>
              <tbody id="excelBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="district-buttons">
      <button class="btn-district" onclick="location.href='Offering/NCMCoffering.html'">NORTH CENTRAL<br/>MINDANAO CONFERENCE</button>
      <button class="btn-district" onclick="location.href='Offering/CMMoffering.html'">CENTRAL<br/>MINDANAO MISSION</button>
      <button class="btn-district" onclick="location.href='Offering/NMMoffering.html'">NORTHEASTERN<br/>MINDANAO MISSION</button>
      <button class="btn-district" onclick="location.href='Offering/WMCoffering.html'">WESTERN<br/>MINDANAO CONFERENCE</button>
      <button class="btn-district" onclick="location.href='Offering/ZPMoffering.html'">ZAMBOANGA<br/>PENINSULAR MISSION</button>
    </div>
    <div class="footer-bottom">
      <button class="btn-home" onclick="location.href='../index.html'">
        <span class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        </span>
        <span class="label">HOMEPAGE</span>
      </button>
      <div class="footer-divider"></div>
      <div class="nav-buttons">
        <button class="btn-page" onclick="location.href='Tithes.html'">
          <span class="btn-page-icon">📋</span>
          <span class="btn-page-label">TITHES</span>
        </button>
        <button class="btn-page" onclick="location.href='FinancialStatement.html'">
          <span class="btn-page-icon">📄</span>
          <span class="btn-page-label">FINANCIAL STATEMENT</span>
        </button>
        <button class="btn-page" onclick="location.href='Reconciliation.html'">
          <span class="btn-page-icon">✔</span>
          <span class="btn-page-label">RECONCILIATION</span>
        </button>
      </div>
      <a href="https://spucadventist.org" class="footer-link">spucadventist.org</a>
    </div>
  </footer>

  <script>
    const VISIBLE_MONTHS = 4;
    const labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const canvas = document.getElementById('offeringChart');
    const containerWidth = canvas.parentElement.clientWidth;
    const containerHeight = canvas.parentElement.clientHeight;
    const barWidth = containerWidth / VISIBLE_MONTHS;
    canvas.style.width = (barWidth * labels.length) + 'px';
    canvas.style.minWidth = (barWidth * labels.length) + 'px';
    canvas.style.height = containerHeight + 'px';

    const datasets = [
      { label: '2025', data: [29938070.07, 25572581.73, 26943637.1, 34327859.77, 27915369.4, 33272114.27, 30302696.7, 25934152.67, 33973938.9, 24600448.63, 24742424.3, 33009367.4], backgroundColor: '#0a1e6e', borderRadius: 4 },
      { label: '2026', data: [23721985.6, null, null, null, null, null, null, null, null, null, null, null], backgroundColor: '#f59e0b', borderRadius: 4 },
      { label: 'Budget', data: [32000000, 28000000, 30000000, 35000000, 30000000, 34000000, 32000000, 28000000, 34000000, 27000000, 28000000, 35000000], backgroundColor: '#ef4444', borderRadius: 4 }
    ];

    const chart = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: false,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } } },
        scales: {
          y: { 
            beginAtZero: true,
            ticks: { callback: v => v >= 1000000 ? '₱' + (v / 1000000).toFixed(1) + 'M' : v >= 1000 ? '₱' + (v / 1000).toFixed(1) + 'K' : '₱' + v, font: { weight: '700', size: 11 }, color: '#ffffff' },
            grid: { color: 'rgba(255,255,255,0.5)', lineWidth: 2 }
          },
          x: { 
            grid: { display: false },
            ticks: { font: { weight: '700', size: 11 }, color: '#ffffff' }
          }
        }
      }
    });

    const legendEl = document.getElementById('chartLegend');
    datasets.forEach((ds, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${ds.backgroundColor}"></span><span class="legend-label">${ds.label}</span>`;
      item.addEventListener('click', () => {
        const meta = chart.getDatasetMeta(i);
        meta.hidden = !meta.hidden;
        item.classList.toggle('legend-hidden');
        chart.update();
      });
      legendEl.appendChild(item);
    });

    const fmt = v => v != null ? '₱' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '-';
    const d2025 = datasets[0].data, d2026 = datasets[1].data, dBudget = datasets[2].data;
    const t2025 = d2025.reduce((a,b) => a+(b||0),0);
    const t2026 = d2026.reduce((a,b) => a+(b||0),0);
    const tBudget = dBudget.reduce((a,b) => a+(b||0),0);
    document.getElementById('excelBody').innerHTML = labels.map((m,i) =>
      `<tr><td class="month-cell">${m}</td><td class="cell-2025">${fmt(d2025[i])}</td><td class="cell-2026">${fmt(d2026[i])}</td><td class="cell-budget">${fmt(dBudget[i])}</td></tr>`
    ).join('') + `<tr class="total-row"><td class="month-cell">Total</td><td class="total-cell">${fmt(t2025)}</td><td class="total-cell">${fmt(t2026)}</td><td class="total-cell">${fmt(tBudget)}</td></tr>`;
  </script>
</body>
</html>
