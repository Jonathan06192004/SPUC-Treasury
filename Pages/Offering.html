<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offerings | Treasury SPUC</title>
  <link rel="icon" type="image/png" href="../Assets/logo.png"/>
  <link rel="stylesheet" href="../Styles/Offering.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cinzel:wght@700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../Script/utils.js"></script>
</head>
<body>

  <header>
    <div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer;">
      <img src="../Assets/logo.png" alt="Logo" class="logo-img"/>
      <div class="org-name">
        <strong>Southwestern Philippines</strong> Union Conference
      </div>
    </div>
  </header>

  <main>
    <div class="title-row">
      <div class="title-left"></div>
      <p class="page-subtitle">Southwestern Philippines Union Conference</p>
      <h1 class="page-title"><img src="../Assets/Offerings.png" alt="Offerings" class="page-title-img"/></h1>
    </div>

    <div class="chart-card" id="mainChartCard">
      <div class="chart-table-row">
        <div class="chart-scroll">
          <canvas id="offeringChart"></canvas>
        </div>
        <div class="right-col">
          <div class="chart-legend" id="chartLegend"></div>
          <div class="excel-table-wrap" onclick="openTableModal()" title="Click to expand">
            <table class="excel-table">
              <thead><tr>
                <th class="th-offerings">OFFERINGS</th>
                <th class="th-2025">2025</th>
                <th class="th-2026">2026</th>
                <th class="th-budget">BUDGET</th>
              </tr></thead>
              <tbody id="excelBody"></tbody>
            </table>
          </div>
          <button class="btn-toggle-main" id="toggleMainBtn" onclick="toggleMain()">&#9660; VIEW ALL MONTHS</button>
          <div class="side-clock" id="sideClock"></div>
        </div>
      </div>
    </div>

    <div class="overview-card hidden" id="overviewCard">
      <div class="overview-top-bar">
        <div class="month-filter-wrap">
          <button class="btn-month-filter" id="monthFilterBtn" onclick="toggleMonthDropdown()">&#128197; FILTER MONTHS <span class="filter-arrow">&#9660;</span></button>
          <div class="month-filter-dropdown hidden" id="monthFilterDropdown">
            <div class="mfd-row">
              <div class="mfd-group">
                <label class="mfd-label">FROM</label>
                <select class="mfd-select" id="fromMonth">
                  <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                  <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                  <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                  <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                </select>
              </div>
              <span class="mfd-arrow">&#8594;</span>
              <div class="mfd-group">
                <label class="mfd-label">TO</label>
                <select class="mfd-select" id="toMonth">
                  <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                  <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                  <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                  <option value="9">October</option><option value="10">November</option><option value="11" selected>December</option>
                </select>
              </div>
            </div>
            <div class="mfd-actions">
              <button class="mfd-btn-apply" onclick="applyMonthFilter()">APPLY</button>
              <button class="mfd-btn-reset" onclick="resetMonthFilter()">RESET</button>
            </div>
          </div>
          <span class="filter-active-pill hidden" id="filterActivePill"></span>
        </div>
        <button class="btn-toggle-back" onclick="toggleMain()">&#9650; BACK TO DETAIL VIEW</button>
      </div>
      <div class="overview-charts-row" id="overviewChartsRow">
        <div class="overview-chart-wrap" id="wrap-bar" onclick="expandChart('wrap-bar')">
          <button class="chart-close-btn" id="close-bar" onclick="event.stopPropagation(); collapseChart()">&#10005;</button>
          <canvas id="overviewChart"></canvas>
        </div>
        <div class="overview-chart-wrap" id="wrap-pie" onclick="expandChart('wrap-pie')">
          <button class="chart-close-btn" id="close-pie" onclick="event.stopPropagation(); collapseChart()">&#10005;</button>
          <canvas id="pieChart"></canvas>
        </div>
        <div class="overview-chart-wrap" id="wrap-line" onclick="expandChart('wrap-line')">
          <button class="chart-close-btn" id="close-line" onclick="event.stopPropagation(); collapseChart()">&#10005;</button>
          <canvas id="lineChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="district-buttons">
      <button class="btn-district" onclick="location.href='Offering/NCMCoffering.html'">NORTH CENTRAL<br/>MINDANAO CONFERENCE</button>
      <button class="btn-district" onclick="location.href='Offering/CMMoffering.html'">CENTRAL<br/>MINDANAO MISSION</button>
      <button class="btn-district" onclick="location.href='Offering/NMMoffering.html'">NORTHEASTERN<br/>MINDANAO MISSION</button>
      <button class="btn-district" onclick="location.href='Offering/WMCoffering.html'">WESTERN<br/>MINDANAO CONFERENCE</button>
      <button class="btn-district" onclick="location.href='Offering/ZPMoffering.html'">ZAMBOANGA<br/>PENINSULAR MISSION</button>
    </div>
    <div class="footer-bottom">
      <button class="btn-arrow" id="hamburgerBtn" onclick="toggleFooterNav()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="footer-nav-wrap" id="footerNavWrap">
        <button class="btn-home" onclick="location.href='../index.html'">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          </span>
          <span class="label">HOMEPAGE</span>
        </button>
        <div class="footer-divider"></div>
        <div class="nav-buttons">
          <button class="btn-page" onclick="location.href='Tithes.html'">
            <span class="btn-page-icon">📋</span>
            <span class="btn-page-label">TITHES</span>
          </button>
          <button class="btn-page" onclick="location.href='Comparative.html'">
            <span class="btn-page-icon">📊</span>
            <span class="btn-page-label">COMPARATIVE</span>
          </button>
          <button class="btn-page" onclick="location.href='FinancialStatement.html'">
            <span class="btn-page-icon">📄</span>
            <span class="btn-page-label">FINANCIAL STATEMENT</span>
          </button>
          <button class="btn-page" onclick="location.href='Reconciliation.html'">
            <span class="btn-page-icon">✔</span>
            <span class="btn-page-label">RECONCILIATION</span>
          </button>
        </div>
      </div>
      <a href="https://spucadventist.org" class="footer-link">spucadventist.org</a>
    </div>
  </footer>

  <script>
    const VISIBLE_MONTHS = 4;
    const labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const canvas = document.getElementById('offeringChart');
    const containerWidth = canvas.parentElement.clientWidth;
    const containerHeight = canvas.parentElement.clientHeight;
    const barWidth = containerWidth / VISIBLE_MONTHS;
    canvas.style.width = (barWidth * labels.length) + 'px';
    canvas.style.minWidth = (barWidth * labels.length) + 'px';
    canvas.style.height = containerHeight + 'px';

    const datasets = [
      { label: '2025', data: [29938070.07, 25572581.73, 26943637.10, 34327859.77, 27915369.40, 33272114.27, 30302696.70, 25934152.67, 33973938.90, 24600448.63, 24742424.30, 33009367.40], backgroundColor: '#0a1e6e', borderRadius: 4 },
      { label: '2026', data: [23721985.60, 31140714.83, 26368161.33, null, null, null, null, null, null, null, null, null], backgroundColor: '#f59e0b', borderRadius: 4 },
      { label: 'Budget', data: [32000000, 28000000, 30000000, 35000000, 30000000, 34000000, 32000000, 28000000, 34000000, 27000000, 28000000, 35000000], backgroundColor: '#ef4444', borderRadius: 4 }
    ];

    const chart = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: false,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } } },
        scales: {
          y: { 
            beginAtZero: true,
            ticks: { callback: v => v >= 1000000 ? '₱' + (v / 1000000).toFixed(1) + 'M' : v >= 1000 ? '₱' + (v / 1000).toFixed(1) + 'K' : '₱' + v, font: { weight: '700', size: 11 }, color: '#ffffff' },
            grid: { color: 'rgba(255,255,255,0.5)', lineWidth: 2 }
          },
          x: { 
            grid: { display: false },
            ticks: { font: { weight: '700', size: 11 }, color: '#ffffff' }
          }
        }
      }
    });

    const legendEl = document.getElementById('chartLegend');
    datasets.forEach((ds, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${ds.backgroundColor}"></span><span class="legend-label">${ds.label}</span>`;
      item.addEventListener('click', () => {
        const meta = chart.getDatasetMeta(i);
        meta.hidden = !meta.hidden;
        item.classList.toggle('legend-hidden');
        chart.update();
      });
      legendEl.appendChild(item);
    });

    updateSideClock();
    setInterval(updateSideClock, 1000);

    let overviewChart = null;
    let lineChart = null;
    let pieChart = null;

    // ---- Mission monthly offering data (for pie filtering) ----
    const missionData = [
      [8423978.37, 5890144.37, 6749753.63, 8640243.73, 5713093.73, 7387405.67, 7967638.30, 5647825.33, 10416009.03, 5008471.43, 4981968.80, 7654224.13], // NCMC
      [2930234.20, 6108608.17, 7391777.43, 8704753.23, 8272590.83, 9679020.80, 6969523.87, 8017628.13, 8899305.50, 6555693.97, 7214962.67, 9541109.40], // CMM
      [5009467.27, 3264745.60, 3542691.70, 3879662.63, 3501869.67, 3499267.07, 4302372.97, 3423456.57, 3504767.43, 3497940.47, 3220721.53, 4051357.87], // NMM
      [7234635.93, 6312085.27, 5773173.97, 7312363.03, 6233734.50, 7274468.83, 6496167.73, 5528993.60, 6698727.10, 6273345.43, 5928348.80, 7397304.03], // WMC
      [6339754.30, 3996998.33, 3486240.37, 5790837.13, 4194080.67, 5431951.90, 4566993.83, 3316249.03, 4455129.83, 3264997.33, 3396422.50, 4365371.97]  // ZPM
    ];

    // ---- Month filter ----
    let activeFrom = 0, activeTo = 11;

    function toggleMonthDropdown() {
      document.getElementById('monthFilterDropdown').classList.toggle('hidden');
    }

    function applyMonthFilter() {
      const from = parseInt(document.getElementById('fromMonth').value);
      const to   = parseInt(document.getElementById('toMonth').value);
      if (from > to) { alert('"From" month cannot be after "To" month.'); return; }
      activeFrom = from; activeTo = to;
      document.getElementById('monthFilterDropdown').classList.add('hidden');
      const pill = document.getElementById('filterActivePill');
      if (from === 0 && to === 11) {
        pill.classList.add('hidden');
      } else {
        pill.textContent = labels[from] + (from === to ? '' : ' – ' + labels[to]);
        pill.classList.remove('hidden');
      }
      updateOverviewCharts(from, to);
    }

    function resetMonthFilter() {
      document.getElementById('fromMonth').value = '0';
      document.getElementById('toMonth').value   = '11';
      applyMonthFilter();
    }

    function updateOverviewCharts(from, to) {
      const slicedLabels = labels.slice(from, to + 1);
      if (overviewChart) {
        overviewChart.data.labels = slicedLabels;
        overviewChart.data.datasets[0].data = datasets[0].data.slice(from, to + 1);
        overviewChart.data.datasets[1].data = datasets[1].data.slice(from, to + 1);
        overviewChart.data.datasets[2].data = datasets[2].data.slice(from, to + 1);
        overviewChart.update('active');
      }
      if (lineChart) {
        lineChart.data.labels = slicedLabels;
        lineChart.data.datasets[0].data = datasets[0].data.slice(from, to + 1);
        lineChart.data.datasets[1].data = datasets[1].data.slice(from, to + 1);
        lineChart.data.datasets[2].data = datasets[2].data.slice(from, to + 1);
        lineChart.update('active');
      }
      if (pieChart) {
        pieChart.data.datasets[0].data = missionData.map(m => m.slice(from, to + 1).reduce((a, b) => a + b, 0));
        pieChart.update('active');
      }
    }

    function toggleMain() {
      const mainCard = document.getElementById('mainChartCard');
      const overviewCard = document.getElementById('overviewCard');
      const isOverview = !overviewCard.classList.contains('hidden');
      if (isOverview) {
        overviewCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
        setTimeout(() => {
          overviewCard.classList.add('hidden');
          overviewCard.style.animation = '';
          mainCard.classList.remove('hidden');
          mainCard.style.animation = 'fadeSlideIn 0.4s ease forwards';
          setTimeout(() => mainCard.style.animation = '', 400);
        }, 300);
      } else {
        mainCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
        setTimeout(() => {
          mainCard.classList.add('hidden');
          mainCard.style.animation = '';
          overviewCard.classList.remove('hidden');
          overviewCard.style.animation = 'fadeSlideIn 0.4s ease forwards';
          setTimeout(() => overviewCard.style.animation = '', 400);
          if (!overviewChart) {
            const barCanvas = document.getElementById('overviewChart');
            overviewChart = new Chart(barCanvas.getContext('2d'), {
              type: 'bar',
              data: { labels, datasets: [
                { label: '2025', data: datasets[0].data, backgroundColor: '#0a1e6e', borderRadius: 4 },
                { label: '2026', data: datasets[1].data, backgroundColor: '#f59e0b', borderRadius: 4 },
                { label: 'Budget', data: datasets[2].data, backgroundColor: '#ef4444', borderRadius: 4 }
              ]},
              options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'top', labels: { color: '#fff', font: { weight: '700', size: 11 } } }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } } },
                scales: {
                  y: { beginAtZero: true, ticks: { callback: v => v >= 1000000 ? '₱' + (v/1000000).toFixed(1) + 'M' : '₱' + v, font: { weight: '700', size: 11 }, color: '#fff' }, grid: { color: 'rgba(255,255,255,0.3)' } },
                  x: { grid: { display: false }, ticks: { font: { weight: '700', size: 11 }, color: '#fff' } }
                }
              }
            });
          }
          if (!lineChart) {
            const lineCanvas = document.getElementById('lineChart');
            lineChart = new Chart(lineCanvas.getContext('2d'), {
              type: 'line',
              data: { labels, datasets: [
                { label: '2025', data: datasets[0].data, borderColor: '#4f7cff', backgroundColor: 'rgba(79,124,255,0.15)', pointBackgroundColor: '#4f7cff', tension: 0.4, fill: true, pointRadius: 4 },
                { label: '2026', data: datasets[1].data, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.15)', pointBackgroundColor: '#f59e0b', tension: 0.4, fill: true, pointRadius: 4 },
                { label: 'Budget', data: datasets[2].data, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', pointBackgroundColor: '#ef4444', tension: 0.4, fill: false, borderDash: [6,3], pointRadius: 4 }
              ]},
              options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'top', labels: { color: '#fff', font: { weight: '700', size: 11 } } }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } } },
                scales: {
                  y: { beginAtZero: true, ticks: { callback: v => v >= 1000000 ? '₱' + (v/1000000).toFixed(1) + 'M' : '₱' + v, font: { weight: '700', size: 11 }, color: '#fff' }, grid: { color: 'rgba(255,255,255,0.3)' } },
                  x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { font: { weight: '700', size: 11 }, color: '#fff' } }
                }
              }
            });
          }
          if (!pieChart) {
            const pieCanvas = document.getElementById('pieChart');
            pieChart = new Chart(pieCanvas.getContext('2d'), {
              type: 'doughnut',
              data: {
                labels: ['NCMC', 'CMM', 'NMM', 'WMC', 'ZPM'],
                datasets: [{
                  data: missionData.map(m => m.slice(activeFrom, activeTo + 1).reduce((a,b) => a+b, 0)),
                  backgroundColor: ['#1a3a8f', '#f5a623', '#22c55e', '#a855f7', '#ef4444'],
                  borderColor: 'rgba(255,255,255,0.25)',
                  borderWidth: 2,
                  hoverOffset: 10
                }]
              },
              options: {
                responsive: true, maintainAspectRatio: false,
                cutout: '52%',
                plugins: {
                  legend: { display: true, position: 'bottom', labels: { color: '#fff', font: { weight: '700', size: 10 }, padding: 8, boxWidth: 12 } },
                  tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ₱${ctx.parsed.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } }
                }
              }
            });
          }
        }, 300);
      }
    }

    // ---- Chart expand / collapse ----
    let expandedWrap = null;

    function expandChart(wrapId) {
      if (expandedWrap === wrapId) { collapseChart(); return; }
      const row = document.getElementById('overviewChartsRow');
      const wraps = row.querySelectorAll('.overview-chart-wrap');
      expandedWrap = wrapId;
      wraps.forEach(w => {
        if (w.id === wrapId) {
          w.classList.add('chart-expanded');
          w.classList.remove('chart-shrunk');
          w.querySelector('.chart-close-btn').classList.add('visible');
        } else {
          w.classList.add('chart-shrunk');
          w.classList.remove('chart-expanded');
          w.querySelector('.chart-close-btn').classList.remove('visible');
        }
      });
      setTimeout(() => resizeAllCharts(), 380);
    }

    function collapseChart() {
      const row = document.getElementById('overviewChartsRow');
      const wraps = row.querySelectorAll('.overview-chart-wrap');
      expandedWrap = null;
      wraps.forEach(w => {
        w.classList.remove('chart-expanded', 'chart-shrunk');
        w.querySelector('.chart-close-btn').classList.remove('visible');
      });
      setTimeout(() => resizeAllCharts(), 380);
    }

    function resizeAllCharts() {
      [overviewChart, lineChart, pieChart].forEach(c => { if (c) c.resize(); });
    }

    const fmt = v => v != null ? '₱' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '-';
    const d2025 = datasets[0].data, d2026 = datasets[1].data, dBudget = datasets[2].data;
    const t2025 = d2025.reduce((a,b) => a+(b||0),0);
    const t2026 = d2026.reduce((a,b) => a+(b||0),0);
    const tBudget = dBudget.reduce((a,b) => a+(b||0),0);
    document.getElementById('excelBody').innerHTML = labels.map((m,i) =>
      `<tr><td class="month-cell">${m}</td><td class="cell-2025">${fmt(d2025[i])}</td><td class="cell-2026">${fmt(d2026[i])}</td><td class="cell-budget">${fmt(dBudget[i])}</td></tr>`
    ).join('') + `<tr class="total-row"><td class="month-cell">Total</td><td class="total-cell">${fmt(t2025)}</td><td class="total-cell">${fmt(t2026)}</td><td class="total-cell">${fmt(tBudget)}</td></tr>`;

    function openTableModal() {
      document.getElementById('modalTableBody').innerHTML = document.getElementById('excelBody').innerHTML;
      document.getElementById('tableModalOverlay').classList.remove('hidden');
      const modal = document.getElementById('tableModal');
      modal.classList.remove('hidden');
      modal.style.animation = 'tableModalIn 0.35s cubic-bezier(0.4,0,0.2,1) forwards';
    }

    function closeTableModal() {
      const modal = document.getElementById('tableModal');
      modal.style.animation = 'tableModalOut 0.25s ease forwards';
      setTimeout(() => {
        modal.classList.add('hidden');
        document.getElementById('tableModalOverlay').classList.add('hidden');
      }, 250);
    }
  </script>

  <!-- Table Modal -->
  <div class="table-modal-overlay hidden" id="tableModalOverlay" onclick="closeTableModal()"></div>
  <div class="table-modal hidden" id="tableModal">
    <div class="table-modal-header">
      <span class="table-modal-title">OFFERINGS - JANUARY TO DECEMBER</span>
      <button class="table-modal-close" onclick="closeTableModal()">&#10005;</button>
    </div>
    <div class="table-modal-body">
      <table class="excel-table table-modal-table">
        <thead>
          <tr><th class="th-offerings">OFFERINGS</th><th class="th-2025">2025</th><th class="th-2026">2026</th><th class="th-budget">BUDGET</th></tr>
        </thead>
        <tbody id="modalTableBody"></tbody>
      </table>
    </div>
  </div>
</body>
</html>
