<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tithes | Treasury SPUC</title>
  <link rel="icon" type="image/png" href="../Assets/logo.png"/>
  <link rel="stylesheet" href="../Styles/Tithes.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cinzel:wght@700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="../Script/utils.js"></script>
</head>
<body>

  <header>
    <div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer;">
      <img src="../Assets/logo.png" alt="Logo" class="logo-img"/>
      <div class="org-name">
        <strong>Southwestern Philippines</strong> Union Conference
      </div>
    </div>
  </header>

  <main>
    <div class="title-row">
      <div class="title-left"></div>
      <p class="page-subtitle">Southwestern Philippines Union Conference</p>
      <h1 class="page-title"><img src="../Assets/Tithes.png" alt="Tithes" class="page-title-img"/></h1>
    </div>

    <div class="chart-card" id="mainChartCard">
      <div class="chart-table-row">
        <div class="chart-scroll">
          <canvas id="tithesChart"></canvas>
        </div>
        <div class="right-col">
          <div class="excel-table-wrap" onclick="openTableModal()" title="Click to expand">
            <table class="excel-table">
              <thead>
                <tr><th class="th-tithes">TITHES</th><th class="th-2025">2025</th><th class="th-2026">2026</th><th class="th-budget">BUDGET</th><th class="th-variance">VARIANCE</th></tr>
              </thead>
              <tbody id="excelBody"></tbody>
            </table>
          </div>
          <div class="chart-legend" id="chartLegend"></div>
          <button class="btn-toggle-main" id="toggleMainBtn" onclick="toggleMain()">&#9660; VIEW ALL MONTHS</button>
          <div class="side-clock" id="sideClock"></div>
        </div>
      </div>
    </div>

    <div class="overview-card hidden" id="overviewCard">
      <div class="overview-top-bar">
        <div class="month-filter-wrap">
          <button class="btn-month-filter" id="monthFilterBtn" onclick="toggleMonthDropdown()">&#128197; FILTER MONTHS <span class="filter-arrow">&#9660;</span></button>
          <div class="month-filter-dropdown hidden" id="monthFilterDropdown">
            <div class="mfd-row">
              <div class="mfd-group">
                <label class="mfd-label">FROM</label>
                <select class="mfd-select" id="fromMonth">
                  <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                  <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                  <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                  <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                </select>
              </div>
              <span class="mfd-arrow">&#8594;</span>
              <div class="mfd-group">
                <label class="mfd-label">TO</label>
                <select class="mfd-select" id="toMonth">
                  <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                  <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                  <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                  <option value="9">October</option><option value="10">November</option><option value="11" selected>December</option>
                </select>
              </div>
            </div>
            <div class="mfd-actions">
              <button class="mfd-btn-apply" onclick="applyMonthFilter()">APPLY</button>
              <button class="mfd-btn-reset" onclick="resetMonthFilter()">RESET</button>
            </div>
          </div>
          <span class="filter-active-pill hidden" id="filterActivePill"></span>
        </div>
        <button class="btn-toggle-back" onclick="toggleMain()">&#9650; BACK TO DETAIL VIEW</button>
      </div>
      <div class="overview-charts-row" id="overviewChartsRow">
        <div class="overview-chart-wrap" id="wrap-bar">
          <button class="chart-close-btn" id="close-bar" onclick="collapseChart()">&#10005;</button>
          <canvas id="overviewChart"></canvas>
        </div>
        <div class="overview-chart-wrap" id="wrap-pie">
          <button class="chart-close-btn" id="close-pie" onclick="collapseChart()">&#10005;</button>
          <canvas id="pieChart"></canvas>
        </div>
        <div class="overview-chart-wrap" id="wrap-line">
          <button class="chart-close-btn" id="close-line" onclick="collapseChart()">&#10005;</button>
          <canvas id="lineChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="district-buttons">
      <button class="btn-district" onclick="location.href='Tithe/NCMCtithe.html'">NORTH CENTRAL<br/>MINDANAO CONFERENCE</button>
      <button class="btn-district" onclick="location.href='Tithe/CMMtithe.html'">CENTRAL<br/>MINDANAO MISSION</button>
      <button class="btn-district" onclick="location.href='Tithe/NMMtithe.html'">NORTHEASTERN<br/>MINDANAO MISSION</button>
      <button class="btn-district" onclick="location.href='Tithe/WMCtithe.html'">WESTERN<br/>MINDANAO CONFERENCE</button>
      <button class="btn-district" onclick="location.href='Tithe/ZPMtithe.html'">ZAMBOANGA<br/>PENINSULAR MISSION</button>
    </div>
    <div class="footer-bottom">
      <button class="btn-arrow" id="hamburgerBtn" onclick="toggleFooterNav()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="footer-nav-wrap" id="footerNavWrap">
        <button class="btn-home" onclick="location.href='../index.html'">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          </span>
          <span class="label">HOMEPAGE</span>
        </button>
        <div class="footer-divider"></div>
        <div class="nav-buttons">
          <button class="btn-page" onclick="location.href='Offering.html'">
            <span class="btn-page-icon">🙏</span>
            <span class="btn-page-label">OFFERINGS</span>
          </button>
          <button class="btn-page" onclick="location.href='Comparative.html'">
            <span class="btn-page-icon">📊</span>
            <span class="btn-page-label">COMPARATIVE</span>
          </button>
          <button class="btn-page" onclick="location.href='FinancialStatement.html'">
            <span class="btn-page-icon">📄</span>
            <span class="btn-page-label">FINANCIAL STATEMENT</span>
          </button>
          <button class="btn-page" onclick="location.href='MonthlyReport.html'">
            <span class="btn-page-icon">✔</span>
            <span class="btn-page-label">MONTHLY REPORT</span>
          </button>
        </div>
      </div>
      <a href="https://spucadventist.org" class="footer-link">spucadventist.org</a>
    </div>
  </footer>

  <script>
    const VISIBLE_MONTHS = 4;
    const labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // SPUC totals = sum of all 5 missions per month (from screenshot)
    const datasets = [
      { label: '2025', data: [69617914.36, 61596239.55, 65948798.45, 79607269.42, 67373242.37, 81624204.69, 74988549.33, 64439238.42, 81572737.88, 63549232.84, 68980414.58, 90367744.52], backgroundColor: '#0a1e6e', borderRadius: 4 },
      { label: '2026', data: [61301229.98, 82826503.21, 68784584.11, null, null, null, null, null, null, null, null, null], backgroundColor: '#f59e0b', borderRadius: 4 },
      { label: 'Budget', data: [75000000, 70000000, 72000000, 80000000, 75000000, 82000000, 78000000, 72000000, 80000000, 70000000, 75000000, 88000000], backgroundColor: '#6d43ea', borderRadius: 4 }
    ];

    // Per-mission 2025 data (from screenshot)
    const missionData = [
      [22621870.89,18578687.78,17162301.27,20294803.38,15619823.58,18203978.14,21189228.22,18660639.55,20985045.33,15892071.06,14178110.09,23315279.12], // NCMC
      [4443619.05,11007216.37,18569355.76,18946323.34,17035848.15,19364276.52,15573564.14,15496542.12,23435771.52,13356756.36,19743514.55,20649250.17],  // CMM
      [8979630.22,6906975.54,7603812.43,8247275.91,7698935.23,10050505.87,9562060.72,7703403.70,8311743.70,8332417.55,9272742.38,10979424.34],           // NMM
      [21470361.40,15298976.00,14811539.90,19149807.77,16873462.51,21203105.61,18036761.13,14558798.10,17601704.97,17197806.26,17023040.69,22382871.58], // WMC
      [12102432.80,9804383.86,7801789.09,12969059.02,10145172.90,12802338.55,10626935.12,8019854.95,11238472.36,8770181.61,8763006.87,13040919.31]       // ZPM
    ];

    // Populate table
    const fmt = v => v != null ? '₱' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '-';
    const fmtVariance = (v25, v26) => {
      if (v25 == null || v26 == null) return '<td class="cell-variance">-</td>';
      const diff = v26 - v25;
      const pct = ((diff / v25) * 100).toFixed(1);
      const cls = diff >= 0 ? 'variance-pos' : 'variance-neg';
      const arrow = diff >= 0 ? '▲' : '▼';
      return `<td class="cell-variance ${cls}">${arrow} ${fmt(Math.abs(diff))}<br><span class="variance-pct">${arrow} ${Math.abs(pct)}%</span></td>`;
    };
    const t25 = datasets[0].data.reduce((a,b)=>a+(b||0),0);
    const t26 = datasets[1].data.reduce((a,b)=>a+(b||0),0);
    const tBgt = datasets[2].data.reduce((a,b)=>a+(b||0),0);
    const tDiff = t26 - t25;
    const tPct = ((tDiff / t25) * 100).toFixed(1);
    const tCls = tDiff >= 0 ? 'variance-pos' : 'variance-neg';
    const tArrow = tDiff >= 0 ? '▲' : '▼';
    document.getElementById('excelBody').innerHTML = labels.map((m,i) =>
      `<tr><td class="month-cell">${m}</td><td class="cell-2025">${fmt(datasets[0].data[i])}</td><td class="cell-2026">${fmt(datasets[1].data[i])}</td><td class="cell-budget">${fmt(datasets[2].data[i])}</td>${fmtVariance(datasets[0].data[i], datasets[1].data[i])}</tr>`
    ).join('') + `<tr class="total-row"><td class="month-cell">Total</td><td class="total-cell">${fmt(t25)}</td><td class="total-cell">${fmt(t26)}</td><td class="total-cell">${fmt(tBgt)}</td><td class="total-cell ${tCls}">${tArrow} ${fmt(Math.abs(tDiff))}<br><span class="variance-pct">${tArrow} ${Math.abs(tPct)}%</span></td></tr>`;

    // Main bar chart
    const canvas = document.getElementById('tithesChart');
    const containerWidth = canvas.parentElement.clientWidth;
    const containerHeight = canvas.parentElement.clientHeight;
    const barWidth = containerWidth / VISIBLE_MONTHS;
    canvas.style.width = (barWidth * labels.length) + 'px';
    canvas.style.minWidth = (barWidth * labels.length) + 'px';
    canvas.style.height = containerHeight + 'px';

    const chart = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: false, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}` } } },
        scales: {
          y: { beginAtZero: true, ticks: { callback: v => v>=1000000?'₱'+(v/1000000).toFixed(1)+'M':v>=1000?'₱'+(v/1000).toFixed(1)+'K':'₱'+v, font:{weight:'700',size:11}, color:'#ffffff' }, grid:{color:'rgba(255,255,255,0.5)',lineWidth:2} },
          x: { grid:{display:false}, ticks:{font:{weight:'700',size:11},color:'#ffffff'} }
        }
      }
    });

    const legendEl = document.getElementById('chartLegend');
    datasets.forEach((ds, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-paren">(</span><span class="legend-dot" style="background:${ds.backgroundColor}"></span><span class="legend-paren">)</span><span class="legend-label">${ds.label}</span>`;
      item.addEventListener('click', () => { const meta = chart.getDatasetMeta(i); meta.hidden = !meta.hidden; item.classList.toggle('legend-hidden'); chart.update(); });
      legendEl.appendChild(item);
    });

    let overviewChart = null, lineChart = null, pieChart = null;
    let resetPieExplode = () => {};
    let activeFrom = 0, activeTo = 11;

    function toggleMonthDropdown() { document.getElementById('monthFilterDropdown').classList.toggle('hidden'); }

    function applyMonthFilter() {
      const from = parseInt(document.getElementById('fromMonth').value);
      const to   = parseInt(document.getElementById('toMonth').value);
      if (from > to) { alert('"From" month cannot be after "To" month.'); return; }
      activeFrom = from; activeTo = to;
      document.getElementById('monthFilterDropdown').classList.add('hidden');
      const pill = document.getElementById('filterActivePill');
      if (from === 0 && to === 11) { pill.classList.add('hidden'); }
      else { pill.textContent = labels[from] + (from === to ? '' : ' – ' + labels[to]); pill.classList.remove('hidden'); }
      const sl = labels.slice(from, to+1);
      if (overviewChart) { overviewChart.data.labels=sl; overviewChart.data.datasets[0].data=datasets[0].data.slice(from,to+1); overviewChart.data.datasets[1].data=datasets[1].data.slice(from,to+1); overviewChart.data.datasets[2].data=datasets[2].data.slice(from,to+1); overviewChart.update('active'); }
      if (lineChart) { lineChart.data.labels=sl; lineChart.data.datasets[0].data=datasets[0].data.slice(from,to+1); lineChart.data.datasets[1].data=datasets[1].data.slice(from,to+1); lineChart.data.datasets[2].data=datasets[2].data.slice(from,to+1); lineChart.update('active'); }
      if (pieChart) {
        pieChart.data.datasets[0].data = missionData.map(m => m.slice(from,to+1).reduce((a,b)=>a+b,0));
        resetPieExplode(false);
        pieChart.update('active');
      }
    }

    function resetMonthFilter() { document.getElementById('fromMonth').value='0'; document.getElementById('toMonth').value='11'; applyMonthFilter(); }

    function toggleMain() {
      const mainCard = document.getElementById('mainChartCard');
      const overviewCard = document.getElementById('overviewCard');
      const isOverview = !overviewCard.classList.contains('hidden');
      if (isOverview) {
        overviewCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
        setTimeout(() => { overviewCard.classList.add('hidden'); overviewCard.style.animation=''; mainCard.classList.remove('hidden'); mainCard.style.animation='fadeSlideIn 0.4s ease forwards'; setTimeout(()=>mainCard.style.animation='',400); }, 300);
      } else {
        mainCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
        setTimeout(() => {
          mainCard.classList.add('hidden'); mainCard.style.animation='';
          overviewCard.classList.remove('hidden'); overviewCard.style.animation='fadeSlideIn 0.4s ease forwards';
          setTimeout(()=>overviewCard.style.animation='',400);
          if (!overviewChart) {
            overviewChart = new Chart(document.getElementById('overviewChart').getContext('2d'), { type:'bar', data:{ labels, datasets:[{label:'2025',data:datasets[0].data,backgroundColor:'#0a1e6e',borderRadius:4},{label:'2026',data:datasets[1].data,backgroundColor:'#f59e0b',borderRadius:4},{label:'Budget',data:datasets[2].data,backgroundColor:'#6d43ea',borderRadius:4}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{color:'#fff',font:{weight:'700',size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v>=1000000?'₱'+(v/1000000).toFixed(1)+'M':'₱'+v,font:{weight:'700',size:11},color:'#fff'},grid:{color:'rgba(255,255,255,0.3)'}},x:{grid:{display:false},ticks:{font:{weight:'700',size:11},color:'#fff'}}}} });
          }
          if (!lineChart) {
            lineChart = new Chart(document.getElementById('lineChart').getContext('2d'), { type:'line', data:{ labels, datasets:[{label:'2025',data:datasets[0].data,borderColor:'#4f7cff',backgroundColor:'rgba(79,124,255,0.15)',pointBackgroundColor:'#4f7cff',tension:0.4,fill:true,pointRadius:4},{label:'2026',data:datasets[1].data,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.15)',pointBackgroundColor:'#f59e0b',tension:0.4,fill:true,pointRadius:4},{label:'Budget',data:datasets[2].data,borderColor:'#6d43ea',backgroundColor:'rgba(109,67,234,0.18)',pointBackgroundColor:'#6d43ea',tension:0.4,fill:false,borderDash:[6,3],pointRadius:4}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{color:'#fff',font:{weight:'700',size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v>=1000000?'₱'+(v/1000000).toFixed(1)+'M':'₱'+v,font:{weight:'700',size:11},color:'#fff'},grid:{color:'rgba(255,255,255,0.3)'}},x:{grid:{color:'rgba(255,255,255,0.1)'},ticks:{font:{weight:'700',size:11},color:'#fff'}}}} });
          }
          if (!pieChart) {
            const pieCanvas = document.getElementById('pieChart');
            const wrap = document.getElementById('wrap-pie');
            const colors = ['#4f7cff','#f5a623','#22d3a0','#c084fc','#f87171'];
            const glowColors = ['rgba(79,124,255,0.7)','rgba(245,166,35,0.7)','rgba(34,211,160,0.7)','rgba(192,132,252,0.7)','rgba(248,113,113,0.7)'];
            const missionLabels = ['NCMC','CMM','NMM','WMC','ZPM'];
            let explodeProgress = 0; // progress 0..1 for detached arc view
            let pieIsExploded = false;
            let rafId = null;

            function easeOutBack(t) {
              return 1 + 2.70158 * Math.pow(t-1,3) + 1.70158 * Math.pow(t-1,2);
            }

            // Custom plugin: draws detached mission arcs with connectors
            const explodePlugin = {
              id: 'explodeDetachedArcs',
              afterDraw(chart) {
                const meta = chart.getDatasetMeta(0);
                if (!meta.data.length) return;
                if (explodeProgress <= 0.01) return;
                const ctx2 = chart.ctx;
                const area = chart.chartArea || { left: 0, top: 0, right: chart.width, bottom: chart.height };
                const cx = (area.left + area.right) / 2;
                const cy = (area.top + area.bottom) / 2;
                const outerR = meta.data[0].outerRadius;
                const innerR = meta.data[0].innerRadius;
                const total = chart.data.datasets[0].data.reduce((a,b)=>a+b,0) || 1;
                const p = explodeProgress;
                const viewW = area.right - area.left;
                const viewH = area.bottom - area.top;
                const viewSize = Math.min(viewW, viewH);
                const panelPad = 10;
                const minX = area.left + panelPad;
                const maxX = area.right - panelPad;
                const minY = area.top + panelPad;
                const maxY = area.bottom - panelPad;
                const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

                // Keep detached parts compact so everything fits inside panel.
                const detachedThickness = Math.max((outerR - innerR) * (1.05 + 0.12 * p), viewSize * 0.10);
                const detachedOuter = outerR + 6 + (viewSize * 0.03) * p;
                const detachedInner = Math.max(8, detachedOuter - detachedThickness);
                const orbit = outerR + 16 + (viewSize * 0.09) * p;

                const drawArrowHead = (x, y, ang, color, alpha) => {
                  const len = 8;
                  const wing = 4;
                  ctx2.save();
                  ctx2.globalAlpha = alpha;
                  ctx2.strokeStyle = color;
                  ctx2.lineWidth = 2;
                  ctx2.beginPath();
                  ctx2.moveTo(x, y);
                  ctx2.lineTo(x - Math.cos(ang - 0.35) * len, y - Math.sin(ang - 0.35) * len);
                  ctx2.moveTo(x, y);
                  ctx2.lineTo(x - Math.cos(ang + 0.35) * len, y - Math.sin(ang + 0.35) * len);
                  ctx2.stroke();
                  ctx2.restore();
                };

                missionLabels.forEach((label, i) => {
                  const arc = meta.data[i];
                  const midAngle = (arc.startAngle + arc.endAngle) / 2;
                  const angleShift = (label === 'NMM') ? 0.42 : 0;
                  const drawStart = arc.startAngle + angleShift;
                  const drawEnd = arc.endAngle + angleShift;
                  const drawMid = midAngle + angleShift;
                  const ease = easeOutBack(Math.min(p, 1));
                  const alpha = Math.min(1, 0.15 + p * 0.95);

                  ctx2.save();
                  ctx2.globalAlpha = alpha;

                  // Detached arc center
                  const proposedX = cx + Math.cos(drawMid) * orbit * ease;
                  const proposedY = cy + Math.sin(drawMid) * orbit * ease;

                  // Pin side placement based on requested grouping:
                  // Right: NCMC, CMM | Left: NMM, WMC, ZPM
                  const rightSide = (label === 'NCMC' || label === 'CMM');
                  const edgeTargetX = rightSide
                    ? (maxX - detachedOuter - 8)
                    : (minX + detachedOuter + 8);
                  const sideBlend = 0.82; // keep slight natural angle while pushing near edge
                  const sideX = proposedX * (1 - sideBlend) + edgeTargetX * sideBlend;
                  const zpmRightNudge = (label === 'ZPM') ? 14 : 0;
                  const nmmRightNudge = (label === 'NMM') ? 120 : 0;
                  const dcx = clamp(sideX + zpmRightNudge + nmmRightNudge, minX + detachedOuter, maxX - detachedOuter);
                  const dcy = clamp(proposedY, minY + detachedOuter, maxY - detachedOuter);

                  // Detached arc
                  ctx2.save();
                  ctx2.shadowColor = glowColors[i];
                  ctx2.shadowBlur = 18 * p;
                  ctx2.fillStyle = colors[i];
                  ctx2.beginPath();
                  ctx2.arc(dcx, dcy, detachedOuter, drawStart, drawEnd);
                  ctx2.arc(dcx, dcy, detachedInner, drawEnd, drawStart, true);
                  ctx2.closePath();
                  ctx2.fill();
                  ctx2.shadowBlur = 0;
                  ctx2.restore();

                  // Connector line (curved + arrow)
                  const sx = cx + Math.cos(midAngle) * (outerR + 2);
                  const sy = cy + Math.sin(midAngle) * (outerR + 2);
                  const ex = dcx + Math.cos(drawMid) * (detachedInner - 3);
                  const ey = dcy + Math.sin(drawMid) * (detachedInner - 3);
                  const nx = -Math.sin(drawMid);
                  const ny = Math.cos(drawMid);
                  const bend = (i % 2 === 0 ? -1 : 1) * (10 + 10 * p);
                  const cpx = (sx + ex) * 0.5 + nx * bend;
                  const cpy = (sy + ey) * 0.5 + ny * bend;

                  ctx2.strokeStyle = 'rgba(255,255,255,0.88)';
                  ctx2.lineWidth = 2.2;
                  ctx2.lineCap = 'round';
                  ctx2.beginPath();
                  ctx2.moveTo(sx, sy);
                  ctx2.quadraticCurveTo(cpx, cpy, ex, ey);
                  ctx2.stroke();

                  const headAngle = Math.atan2(ey - cpy, ex - cpx);
                  drawArrowHead(ex, ey, headAngle, 'rgba(255,255,255,0.88)', alpha);

                  // Label inside detached arc
                  if (p > 0.22) {
                    const value = chart.data.datasets[0].data[i];
                    const pct = ((value / total) * 100).toFixed(1) + '%';
                    const money = '₱' + (value / 1000000).toFixed(1) + 'M';
                    const fullNames = {
                      'NCMC': ['North Central', 'Mindanao', 'Conference'],
                      'CMM':  ['Central', 'Mindanao', 'Mission'],
                      'NMM':  ['Northeastern', 'Mindanao', 'Mission'],
                      'WMC':  ['Western', 'Mindanao', 'Conference'],
                      'ZPM':  ['Zamboanga', 'Peninsular', 'Mission']
                    };
                    const lines = fullNames[label] || [label];
                    const labelR = detachedInner + (detachedOuter - detachedInner) * 0.5;
                    const tx = dcx + Math.cos(drawMid) * labelR;
                    const ty = dcy + Math.sin(drawMid) * labelR;
                    const nameSize = Math.max(10, Math.round(9 + 4 * p));
                    const dataSize = Math.max(11, Math.round(10 + 4 * p));
                    const lineH = nameSize + 4;
                    const totalLines = lines.length + 2;
                    const startY = ty - (totalLines / 2) * lineH + lineH * 0.5;

                    ctx2.textAlign = 'center';
                    ctx2.textBaseline = 'middle';

                    // Mission name lines — white with dark shadow
                    ctx2.shadowColor = 'rgba(0,0,0,0.85)';
                    ctx2.shadowBlur = 5;
                    ctx2.fillStyle = '#ffffff';
                    ctx2.font = `800 ${nameSize}px Montserrat,sans-serif`;
                    lines.forEach((ln, li) => ctx2.fillText(ln, tx, startY + li * lineH));

                    // Divider line
                    const divY = startY + lines.length * lineH - lineH * 0.3;
                    const divHalfW = Math.min(detachedOuter * 0.38, 36);
                    ctx2.shadowBlur = 0;
                    ctx2.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx2.lineWidth = 1;
                    ctx2.beginPath();
                    ctx2.moveTo(tx - divHalfW, divY);
                    ctx2.lineTo(tx + divHalfW, divY);
                    ctx2.stroke();

                    // Percentage — bright arc color
                    ctx2.shadowColor = 'rgba(0,0,0,0.9)';
                    ctx2.shadowBlur = 6;
                    ctx2.fillStyle = '#ffffff';
                    ctx2.font = `900 ${dataSize + 2}px Montserrat,sans-serif`;
                    ctx2.fillText(pct, tx, startY + lines.length * lineH + lineH * 0.55);

                    // Money — slightly smaller, softer white
                    ctx2.fillStyle = 'rgba(255,255,255,0.88)';
                    ctx2.font = `700 ${dataSize}px Montserrat,sans-serif`;
                    ctx2.fillText(money, tx, startY + (lines.length + 1) * lineH + lineH * 0.55);
                    ctx2.shadowBlur = 0;
                  }
                  ctx2.restore();
                })
              }
            };

            // Center label plugin
            const centerLabelPlugin = {
              id: 'centerLabel',
              afterDraw(chart) {
                if (explodeProgress > 0.12) return;
                const { ctx: c, chartArea } = chart;
                if (!chartArea) return;
                const cx = (chartArea.left + chartArea.right) / 2;
                const cy = (chartArea.top + chartArea.bottom) / 2;
                const total = chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
                const totalM = (total/1000000).toFixed(1);
                c.save();
                c.textAlign = 'center';
                c.textBaseline = 'middle';
                c.font = '800 13px Montserrat,sans-serif';
                c.fillStyle = 'rgba(255,255,255,0.55)';
                c.fillText('TOTAL', cx, cy - 13);
                c.font = '900 15px Montserrat,sans-serif';
                c.fillStyle = '#f5a623';
                c.shadowColor = 'rgba(245,166,35,0.8)';
                c.shadowBlur = 10;
                c.fillText('₱' + totalM + 'M', cx, cy + 4);
                c.shadowBlur = 0;
                c.font = '700 10px Montserrat,sans-serif';
                c.fillStyle = 'rgba(255,255,255,0.45)';
                c.fillText('2025', cx, cy + 19);
                c.restore();
              }
            };

            // Outer pulse ring plugin
            let pulseT = 0;
            const pulsePlugin = {
              id: 'pulseRing',
              afterDraw(chart) {
                if (explodeProgress > 0.05) return;
                const meta = chart.getDatasetMeta(0);
                if (!meta.data.length) return;
                const { ctx: c, chartArea } = chart;
                const cx = (chartArea.left + chartArea.right) / 2;
                const cy = (chartArea.top + chartArea.bottom) / 2;
                const outerR = meta.data[0].outerRadius;
                pulseT = (pulseT + 0.018) % (Math.PI * 2);
                const pulse = 1 + Math.sin(pulseT) * 0.012;
                const r = outerR * pulse + 6;
                c.save();
                const grad = c.createRadialGradient(cx, cy, r - 4, cx, cy, r + 4);
                grad.addColorStop(0, 'rgba(79,124,255,0.0)');
                grad.addColorStop(0.5, 'rgba(79,124,255,0.35)');
                grad.addColorStop(1, 'rgba(79,124,255,0.0)');
                c.beginPath();
                c.arc(cx, cy, r, 0, Math.PI * 2);
                c.strokeStyle = grad;
                c.lineWidth = 8;
                c.stroke();
                c.restore();
              }
            };

            pieChart = new Chart(pieCanvas.getContext('2d'), {
              type: 'doughnut',
              plugins: [ChartDataLabels, explodePlugin, centerLabelPlugin, pulsePlugin],
              data: {
                labels: missionLabels,
                datasets: [{
                  data: missionData.map(m => m.slice(activeFrom,activeTo+1).reduce((a,b)=>a+b,0)),
                  backgroundColor: colors,
                  borderColor: glowColors,
                  borderWidth: 3,
                  hoverOffset: 14,
                  hoverBorderWidth: 4,
                  hoverBorderColor: '#fff'
                }]
              },
              options: {
                responsive: true, maintainAspectRatio: false, radius: '76%', cutout: '40%',
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    backgroundColor: 'rgba(10,20,80,0.92)',
                    borderColor: 'rgba(255,255,255,0.2)',
                    borderWidth: 1,
                    titleColor: '#f5a623',
                    bodyColor: '#fff',
                    padding: 10,
                    callbacks: { label: ctx => ` ${ctx.label}: ₱${ctx.parsed.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}` }
                  },
                  datalabels: {
                    color: '#fff', font: { weight: '800', size: 11 },
                    textShadowBlur: 6, textShadowColor: 'rgba(0,0,0,0.8)',
                    formatter: (value, ctx) => {
                      const total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
                      const pct = ((value/total)*100).toFixed(1);
                      return `${pct}%\n₱${(value/1000000).toFixed(1)}M`;
                    },
                    display: ctx => {
                      if (explodeProgress > 0.12) return false;
                      const total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
                      return (ctx.dataset.data[ctx.dataIndex]/total) > 0.05;
                    }
                  }
                },
                animation: { duration: 600, easing: 'easeOutQuart' }
              }
            });

            // Animate pulse ring continuously
            (function animatePulse() {
              if (pieChart) { pieChart.draw(); requestAnimationFrame(animatePulse); }
            })();

            new ResizeObserver(() => pieChart && pieChart.resize()).observe(wrap);

            function setExplodeState(show, animate = true) {
              if (rafId) cancelAnimationFrame(rafId);
              const dur = animate ? 520 : 0;
              const t0 = performance.now();
              const from = explodeProgress;
              const to = show ? 1 : 0;
              pieIsExploded = show;
              // Exploded mode is display-only: no hover highlight/tooltip noise.
              pieChart.options.events = show ? ['click'] : undefined;
              pieChart.options.plugins.tooltip.enabled = !show;
              pieChart.data.datasets[0].hoverOffset = show ? 0 : 8;
              if (dur === 0) {
                explodeProgress = to;
                pieChart.update('none');
                return;
              }
              function step(now) {
                const t = Math.min((now - t0) / dur, 1);
                explodeProgress = from + (to - from) * t;
                pieChart.draw();
                if (t < 1) rafId = requestAnimationFrame(step);
              }
              rafId = requestAnimationFrame(step);
            }
            resetPieExplode = (animate = true) => setExplodeState(false, animate);

            // Pie wrap click: expand wrap OR toggle full split
            wrap.addEventListener('click', e => {
              if (e.target.closest('.chart-close-btn')) return;
              // If not yet expanded, go directly to exploded view after expand animation.
              if (!wrap.classList.contains('chart-expanded')) {
                expandChart('wrap-pie');
                setTimeout(() => {
                  if (expandedWrap === 'wrap-pie' && !pieIsExploded) setExplodeState(true);
                }, 430);
                return;
              }
              // Expanded flow:
              // 1st click -> explode
              // 2nd click on exploded -> go back to normal "View All Months" layout
              if (!pieIsExploded) setExplodeState(true);
              else collapseChart();
            });
          }
        }, 300);
      }
    }

    updateSideClock();
    setInterval(updateSideClock, 1000);

    let expandedWrap = null;
    function expandChart(wrapId) {
      if (expandedWrap === wrapId) { collapseChart(); return; }
      expandedWrap = wrapId;
      document.querySelectorAll('.overview-chart-wrap').forEach(w => {
        if (w.id === wrapId) { w.classList.add('chart-expanded'); w.classList.remove('chart-shrunk'); w.querySelector('.chart-close-btn').classList.add('visible'); }
        else { w.classList.add('chart-shrunk'); w.classList.remove('chart-expanded'); w.querySelector('.chart-close-btn').classList.remove('visible'); }
      });
      setTimeout(() => [overviewChart, lineChart, pieChart].forEach(c => c && c.resize()), 420);
    }
    function collapseChart() {
      expandedWrap = null;
      document.querySelectorAll('.overview-chart-wrap').forEach(w => { w.classList.remove('chart-expanded','chart-shrunk'); w.querySelector('.chart-close-btn').classList.remove('visible'); });
      resetPieExplode(false);
      setTimeout(() => [overviewChart, lineChart, pieChart].forEach(c => c && c.resize()), 420);
    }
    // bar and line wraps keep their onclick
    document.getElementById('wrap-bar').addEventListener('click', () => expandChart('wrap-bar'));
    document.getElementById('wrap-line').addEventListener('click', () => expandChart('wrap-line'));
    function openTableModal() {
      document.getElementById('modalTableBody').innerHTML = document.getElementById('excelBody').innerHTML;
      document.getElementById('tableModalOverlay').classList.remove('hidden');
      const modal = document.getElementById('tableModal');
      modal.classList.remove('hidden');
      modal.style.animation = 'tableModalIn 0.35s cubic-bezier(0.4,0,0.2,1) forwards';
    }
    function closeTableModal() {
      const modal = document.getElementById('tableModal');
      modal.style.animation = 'tableModalOut 0.25s ease forwards';
      setTimeout(() => {
        modal.classList.add('hidden');
        document.getElementById('tableModalOverlay').classList.add('hidden');
      }, 250);
    }
  </script>
  <!-- Table Modal -->
  <div class="table-modal-overlay hidden" id="tableModalOverlay" onclick="closeTableModal()"></div>
  <div class="table-modal hidden" id="tableModal">
    <div class="table-modal-header">
      <span class="table-modal-title">TITHES — JANUARY TO DECEMBER</span>
      <button class="table-modal-close" onclick="closeTableModal()">&#10005;</button>
    </div>
    <div class="table-modal-body">
      <table class="excel-table table-modal-table">
        <thead>
          <tr><th class="th-tithes">TITHES</th><th class="th-2025">2025</th><th class="th-2026">2026</th><th class="th-budget">BUDGET</th><th class="th-variance">VARIANCE</th></tr>
        </thead>
        <tbody id="modalTableBody"></tbody>
      </table>
    </div>
  </div>

</body>
</html>
