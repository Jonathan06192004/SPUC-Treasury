<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tithes | Treasury SPUC</title>
  <link rel="stylesheet" href="../Styles/Tithes.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cinzel:wght@700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer;">
      <img src="../Assets/logo.png" alt="Logo" class="logo-img"/>
      <div class="org-name">
        <strong>Southwestern Philippine</strong> Union Conference
      </div>
    </div>
  </header>

  <main>
    <div class="title-row">
      <div class="title-left"></div>
      <p class="page-subtitle">Southwestern Philippine Union Conference</p>
      <h1 class="page-title"><img src="../Assets/Tithes.png" alt="Tithes" class="page-title-img"/></h1>
    </div>

    <div class="chart-card" id="mainChartCard">
      <div class="chart-table-row">
        <div class="chart-scroll">
          <canvas id="tithesChart"></canvas>
        </div>
        <div class="right-col">
          <div class="chart-legend" id="chartLegend"></div>
          <div class="excel-table-wrap">
            <table class="excel-table">
              <thead>
                <tr><th class="th-tithes">TITHES</th><th class="th-2024">2024</th><th class="th-2025">2025</th><th class="th-budget">BUDGET</th></tr>
              </thead>
              <tbody id="excelBody"></tbody>
            </table>
          </div>
          <button class="btn-toggle-main" id="toggleMainBtn" onclick="toggleMain()">&#9660; VIEW ALL MONTHS</button>
          <div class="side-clock" id="sideClock"></div>
        </div>
      </div>
    </div>

    <div class="overview-card hidden" id="overviewCard">
      <button class="btn-toggle-back" onclick="toggleMain()">&#9650; BACK TO DETAIL VIEW</button>
      <div class="overview-charts-row">
        <div class="overview-chart-wrap">
          <canvas id="overviewChart"></canvas>
        </div>
        <div class="overview-chart-wrap">
          <canvas id="lineChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="district-buttons">
      <button class="btn-district" onclick="location.href='Tithe/NCMCtithe.html'">NORTH CENTRAL<br/>MINDANAO CONFERENCE</button>
      <button class="btn-district" onclick="location.href='Tithe/CMMtithe.html'">CENTRAL<br/>MINDANAO MISSION</button>
      <button class="btn-district" onclick="location.href='Tithe/NMMtithe.html'">NORTHEASTERN<br/>MINDANAO MISSION</button>
      <button class="btn-district" onclick="location.href='Tithe/WMCtithe.html'">WESTERN<br/>MINDANAO CONFERENCE</button>
      <button class="btn-district" onclick="location.href='Tithe/ZPMtithe.html'">ZAMBOANGA<br/>PENINSULAR MISSION</button>
    </div>
    <div class="footer-bottom">
      <button class="btn-arrow" id="hamburgerBtn" onclick="toggleFooterNav()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="footer-nav-wrap hidden" id="footerNavWrap">
        <button class="btn-home" onclick="location.href='../index.html'">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          </span>
          <span class="label">HOMEPAGE</span>
        </button>
        <div class="footer-divider"></div>
        <div class="nav-buttons">
          <button class="btn-page" onclick="location.href='Offering.html'">
            <span class="btn-page-icon">🙏</span>
            <span class="btn-page-label">OFFERINGS</span>
          </button>
          <button class="btn-page" onclick="location.href='Comparative.html'">
            <span class="btn-page-icon">📊</span>
            <span class="btn-page-label">COMPARATIVE</span>
          </button>
          <button class="btn-page" onclick="location.href='FinancialStatement.html'">
            <span class="btn-page-icon">📄</span>
            <span class="btn-page-label">FINANCIAL STATEMENT</span>
          </button>
          <button class="btn-page" onclick="location.href='Reconciliation.html'">
            <span class="btn-page-icon">✔</span>
            <span class="btn-page-label">RECONCILIATION</span>
          </button>
        </div>
      </div>
      <a href="https://spucadventist.org" class="footer-link">spucadventist.org</a>
    </div>
  </footer>

  <script>
    const VISIBLE_MONTHS = 4;
    const labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const canvas = document.getElementById('tithesChart');
    const containerWidth = canvas.parentElement.clientWidth;
    const containerHeight = canvas.parentElement.clientHeight;
    const barWidth = containerWidth / VISIBLE_MONTHS;
    canvas.style.width = (barWidth * labels.length) + 'px';
    canvas.style.minWidth = (barWidth * labels.length) + 'px';
    canvas.style.height = containerHeight + 'px';

    const datasets = [
      { label: '2024', data: [69617914.36, 61596239.55, 65948798.45, 79607269.42, 67373242.37, 81624204.69, 74988549.33, 64439238.42, 81572737.88, 63549232.84, 68980414.58, 90367744.52], backgroundColor: '#0a1e6e', borderRadius: 4 },
      { label: '2025', data: [61301229.98, null, null, null, null, null, null, null, null, null, null, null], backgroundColor: '#f59e0b', borderRadius: 4 },
      { label: 'Budget', data: [75000000, 70000000, 72000000, 80000000, 75000000, 82000000, 78000000, 72000000, 80000000, 70000000, 75000000, 88000000], backgroundColor: '#ef4444', borderRadius: 4 }
    ];

    const chart = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: false,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } } },
        scales: {
          y: { 
            beginAtZero: true,
            ticks: { callback: v => v >= 1000000 ? '₱' + (v / 1000000).toFixed(1) + 'M' : v >= 1000 ? '₱' + (v / 1000).toFixed(1) + 'K' : '₱' + v, font: { weight: '700', size: 11 }, color: '#ffffff' },
            grid: { color: 'rgba(255,255,255,0.5)', lineWidth: 2 }
          },
          x: { 
            grid: { display: false },
            ticks: { font: { weight: '700', size: 11 }, color: '#ffffff' }
          }
        }
      }
    });

    const legendEl = document.getElementById('chartLegend');
    datasets.forEach((ds, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${ds.backgroundColor}"></span><span class="legend-label">${ds.label}</span>`;
      item.addEventListener('click', () => {
        const meta = chart.getDatasetMeta(i);
        meta.hidden = !meta.hidden;
        item.classList.toggle('legend-hidden');
        chart.update();
      });
      legendEl.appendChild(item);
    });

    let overviewChart = null;
    let lineChart = null;

    function toggleMain() {
      const mainCard = document.getElementById('mainChartCard');
      const overviewCard = document.getElementById('overviewCard');
      const isOverview = !overviewCard.classList.contains('hidden');

      if (isOverview) {
        overviewCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
        setTimeout(() => {
          overviewCard.classList.add('hidden');
          overviewCard.style.animation = '';
          mainCard.classList.remove('hidden');
          mainCard.style.animation = 'fadeSlideIn 0.4s ease forwards';
          setTimeout(() => mainCard.style.animation = '', 400);
        }, 300);
      } else {
        mainCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
        setTimeout(() => {
          mainCard.classList.add('hidden');
          mainCard.style.animation = '';
          overviewCard.classList.remove('hidden');
          overviewCard.style.animation = 'fadeSlideIn 0.4s ease forwards';
          setTimeout(() => overviewCard.style.animation = '', 400);
          if (!overviewChart) {
            const barCanvas = document.getElementById('overviewChart');
            const barWrap = barCanvas.parentElement;
            barCanvas.style.width = (barWrap.clientWidth - 16) + 'px';
            barCanvas.style.height = (barWrap.clientHeight - 30) + 'px';
            overviewChart = new Chart(barCanvas.getContext('2d'), {
              type: 'bar',
              data: { labels, datasets: [
                { label: '2024', data: datasets[0].data, backgroundColor: '#0a1e6e', borderRadius: 4 },
                { label: '2025', data: datasets[1].data, backgroundColor: '#f59e0b', borderRadius: 4 },
                { label: 'Budget', data: datasets[2].data, backgroundColor: '#ef4444', borderRadius: 4 }
              ]},
              options: {
                responsive: false, maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'top', labels: { color: '#fff', font: { weight: '700', size: 11 } } }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } } },
                scales: {
                  y: { beginAtZero: true, ticks: { callback: v => v >= 1000000 ? '₱' + (v/1000000).toFixed(1) + 'M' : '₱' + v, font: { weight: '700', size: 11 }, color: '#fff' }, grid: { color: 'rgba(255,255,255,0.3)' } },
                  x: { grid: { display: false }, ticks: { font: { weight: '700', size: 11 }, color: '#fff' } }
                }
              }
            });
          }
          if (!lineChart) {
            const lineCanvas = document.getElementById('lineChart');
            const lineWrap = lineCanvas.parentElement;
            lineCanvas.style.width = (lineWrap.clientWidth - 16) + 'px';
            lineCanvas.style.height = (lineWrap.clientHeight - 30) + 'px';
            lineChart = new Chart(lineCanvas.getContext('2d'), {
              type: 'line',
              data: { labels, datasets: [
                { label: '2024', data: datasets[0].data, borderColor: '#4f7cff', backgroundColor: 'rgba(79,124,255,0.15)', pointBackgroundColor: '#4f7cff', tension: 0.4, fill: true, pointRadius: 4 },
                { label: '2025', data: datasets[1].data, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.15)', pointBackgroundColor: '#f59e0b', tension: 0.4, fill: true, pointRadius: 4 },
                { label: 'Budget', data: datasets[2].data, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', pointBackgroundColor: '#ef4444', tension: 0.4, fill: false, borderDash: [6,3], pointRadius: 4 }
              ]},
              options: {
                responsive: false, maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'top', labels: { color: '#fff', font: { weight: '700', size: 11 } } }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } } },
                scales: {
                  y: { beginAtZero: true, ticks: { callback: v => v >= 1000000 ? '₱' + (v/1000000).toFixed(1) + 'M' : '₱' + v, font: { weight: '700', size: 11 }, color: '#fff' }, grid: { color: 'rgba(255,255,255,0.3)' } },
                  x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { font: { weight: '700', size: 11 }, color: '#fff' } }
                }
              }
            });
          }
        }, 300);
      }
    }

    function updateSideClock() {
      const now = new Date();
      const date = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      let hours = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const hh = String(hours).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('sideClock').innerHTML = `
        <div class="side-clock-time">${hh}:${mm}:${ss} <span class="side-clock-ampm">${ampm}</span></div>
        <div class="side-clock-date">${date}</div>
      `;
    }
    updateSideClock();
    setInterval(updateSideClock, 1000);

    function alignFooterToNCMC() {
      const ncmc = document.querySelector('.btn-district');
      const footer = document.querySelector('.footer-bottom');
      if (ncmc && footer) {
        const rect = ncmc.getBoundingClientRect();
        footer.style.paddingLeft = (rect.left - 40) + 'px';
      }
    }
    alignFooterToNCMC();
    window.addEventListener('resize', alignFooterToNCMC);

    function toggleFooterNav() {
      const wrap = document.getElementById('footerNavWrap');
      const btn = document.getElementById('hamburgerBtn');
      const isHidden = wrap.classList.contains('hidden');
      const items = wrap.querySelectorAll('.btn-home, .footer-divider, .btn-page');

      if (isHidden) {
        wrap.classList.remove('hidden');
        btn.classList.add('active');
        items.forEach((el, i) => {
          el.style.opacity = '0';
          el.style.transform = 'translateX(-20px)';
          setTimeout(() => {
            el.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
            el.style.opacity = '1';
            el.style.transform = 'translateX(0)';
          }, i * 80);
        });
      } else {
        btn.classList.remove('active');
        const reversed = Array.from(items).reverse();
        reversed.forEach((el, i) => {
          setTimeout(() => {
            el.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
            el.style.opacity = '0';
            el.style.transform = 'translateX(-20px)';
          }, i * 60);
        });
        setTimeout(() => wrap.classList.add('hidden'), reversed.length * 60 + 200);
      }
    }

    const fmt = v => v != null ? '₱' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '-';
    const data2024 = datasets[0].data;
    const data2025 = datasets[1].data;
    const dataBudget = datasets[2].data;
    const total2024 = data2024.reduce((a, b) => a + (b || 0), 0);
    const total2025 = data2025.reduce((a, b) => a + (b || 0), 0);
    const totalBudget = dataBudget.reduce((a, b) => a + (b || 0), 0);
    const tbody = document.getElementById('excelBody');
    tbody.innerHTML = labels.map((m, i) => `
      <tr>
        <td class="month-cell">${m}</td>
        <td class="cell-2024">${fmt(data2024[i])}</td>
        <td class="cell-2025">${fmt(data2025[i])}</td>
        <td class="cell-budget">${fmt(dataBudget[i])}</td>
      </tr>
    `).join('') + `
      <tr class="total-row">
        <td class="month-cell">Total</td>
        <td class="total-cell">${fmt(total2024)}</td>
        <td class="total-cell">${fmt(total2025)}</td>
        <td class="total-cell">${fmt(totalBudget)}</td>
      </tr>
    `;
  </script>
</body>
</html>
