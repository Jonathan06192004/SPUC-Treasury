<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comparative | Treasury SPUC</title>
  <link rel="icon" type="image/png" href="../Assets/logo.png"/>
  <link rel="stylesheet" href="../Styles/Comparative.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../Script/supabase.js"></script>
  <script src="../Script/utils.js"></script>
</head>
<body>

  <header>
    <div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer;">
      <img src="../Assets/logo.png" alt="Logo" class="logo-img"/>
      <div class="org-name">
        <strong>Southwestern Philippines</strong> Union Conference
      </div>
    </div>
    <button class="btn-back" onclick="history.back()">&#8592; Back</button>
  </header>

  <main>
    <div class="title-row">
      <div class="title-left"></div>
      <p class="page-subtitle">Southwestern Philippines Union Conference</p>
      <h1 class="page-title"><img src="../Assets/Comparative.png" alt="Comparative" class="page-title-img"/></h1>
    </div>

    <div class="content-area">

      <!-- Chart Section -->
      <div class="chart-card" id="mainChartCard">
        <div class="chart-scroll">
          <canvas id="comparativeChart"></canvas>
        </div>
      </div>

      <!-- Overview Card -->
      <div class="overview-card hidden" id="overviewCard">
        <div class="overview-top-bar">
          <div class="month-filter-wrap">
            <button class="btn-month-filter" onclick="toggleMonthDropdown()">&#128197; FILTER MONTHS <span class="filter-arrow">&#9660;</span></button>
            <div class="month-filter-dropdown hidden" id="monthFilterDropdown">
              <div class="mfd-row">
                <div class="mfd-group">
                  <label class="mfd-label">FROM</label>
                  <select class="mfd-select" id="fromMonth">
                    <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                    <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                    <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                    <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                  </select>
                </div>
                <span class="mfd-arrow">&#8594;</span>
                <div class="mfd-group">
                  <label class="mfd-label">TO</label>
                  <select class="mfd-select" id="toMonth">
                    <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                    <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                    <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                    <option value="9">October</option><option value="10">November</option><option value="11" selected>December</option>
                  </select>
                </div>
              </div>
              <div class="mfd-actions">
                <button class="mfd-btn-apply" onclick="applyMonthFilter()">APPLY</button>
                <button class="mfd-btn-reset" onclick="resetMonthFilter()">RESET</button>
              </div>
            </div>
            <span class="filter-active-pill hidden" id="filterActivePill"></span>
          </div>
        </div>
        <div class="overview-charts-row">
          <div class="overview-chart-wrap"><canvas id="overviewChart"></canvas></div>
          <div class="overview-chart-wrap"><canvas id="lineChart"></canvas></div>
        </div>
      </div>

      <!-- Right Col: Table + Legend -->
      <div class="right-col">
        <div class="summary-table-wrap" onclick="openTableModal()" title="Click to expand">
          <table class="summary-table">
            <thead>
              <tr>
                <th class="th-month">MONTH</th>
                <th class="th-tithes" id="thTithes">TITHES 2025</th>
                <th class="th-offerings" id="thOfferings">OFFERINGS 2025</th>
                <th class="th-total">TOTAL</th>
              </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
          </table>
        </div>
        <div class="legend-row">
          <div class="chart-legend" id="chartLegend"></div>
          <button class="btn-year-toggle" id="yearToggleBtn" onclick="toggleYear()">VIEW 2026 &#8594;</button>
        </div>
        <button class="btn-toggle-main" id="toggleMainBtn" onclick="toggleMain()">&#9660; VIEW ALL MONTHS</button>
        <div class="side-clock" id="sideClock"></div>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-bottom">
      <button class="btn-arrow" id="hamburgerBtn" onclick="toggleFooterNav()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="footer-nav-wrap" id="footerNavWrap">
        <button class="btn-home" onclick="location.href='../index.html'">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          </span>
          <span class="label">HOMEPAGE</span>
        </button>
        <div class="footer-divider"></div>
        <div class="nav-buttons">
          <button class="btn-page" onclick="location.href='Tithes.html'">
            <span class="btn-page-icon">📋</span>
            <span class="btn-page-label">TITHES</span>
          </button>
          <button class="btn-page" onclick="location.href='Offering.html'">
            <span class="btn-page-icon">🙏</span>
            <span class="btn-page-label">OFFERINGS</span>
          </button>
          <button class="btn-page" onclick="location.href='FinancialStatement.html'">
            <span class="btn-page-icon">📄</span>
            <span class="btn-page-label">FINANCIAL STATEMENT</span>
          </button>
          <button class="btn-page" onclick="location.href='MonthlyReport.html'">
            <span class="btn-page-icon">✔</span>
            <span class="btn-page-label">MONTHLY REPORT</span>
          </button>
        </div>
      </div>
      <a href="https://spucadventist.org" class="footer-link">spucadventist.org</a>
    </div>
  </footer>

  <!-- Table Modal -->
  <div class="table-modal-overlay hidden" id="tableModalOverlay" onclick="closeTableModal()"></div>
  <div class="table-modal hidden" id="tableModal">
    <div class="table-modal-header">
      <span class="table-modal-title">COMPARATIVE - JANUARY TO DECEMBER</span>
      <button class="table-modal-close" onclick="closeTableModal()">&#10005;</button>
    </div>
    <div class="table-modal-body">
      <table class="summary-table table-modal-table">
        <thead>
          <tr>
            <th class="th-month">MONTH</th>
            <th class="th-tithes" id="modalThTithes">TITHES 2025</th>
            <th class="th-offerings" id="modalThOfferings">OFFERINGS 2025</th>
            <th class="th-total">TOTAL</th>
          </tr>
        </thead>
        <tbody id="modalSummaryBody"></tbody>
      </table>
    </div>
  </div>

  <script src="../Script/Comparative.js"></script>
</body>
</html>
