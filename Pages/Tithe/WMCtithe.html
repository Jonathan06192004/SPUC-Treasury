<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WMC Tithes | Treasury SPUC</title>
  <link rel="stylesheet" href="../../Styles/Tithe/WMCtithe.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../../Script/utils.js"></script>
</head>
<body>

  <header>
    <div class="logo-area" onclick="location.href='../../index.html'" style="cursor:pointer;">
      <img src="../../Assets/logo.png" alt="Logo" class="logo-img"/>
      <div class="org-name">
        <strong>Southwestern Philippines</strong> Union Conference
      </div>
    </div>
    <button class="btn-back" onclick="location.href='../Tithes.html'">&#8592; Back</button>
  </header>

  <main>
    <div class="title-row">
      <div class="title-left"></div>
      <p class="page-subtitle">Western Mindanao Conference</p>
      <h1 class="page-title"><img src="../../Assets/Tithes.png" alt="Tithes" class="page-title-img"/></h1>
    </div>

    <div class="chart-card" id="mainChartCard">
      <div class="chart-table-row">
        <div class="chart-scroll">
          <canvas id="wmcChart"></canvas>
        </div>
        <div class="right-col">
          <div class="excel-table-wrap">
            <table class="excel-table">
              <thead><tr>
                <th class="th-wmc">WMC</th>
                <th class="th-2025">2025</th>
                <th class="th-2026">2026</th>
                <th class="th-budget">BUDGET</th>
                <th class="th-variance">VARIANCE</th>
              </tr></thead>
              <tbody id="excelBody"></tbody>
            </table>
          </div>
          <div class="chart-legend" id="chartLegend"></div>
          <button class="btn-toggle-main" id="toggleMainBtn" onclick="toggleMain()">&#9660; VIEW ALL MONTHS</button>
          <div class="side-clock" id="sideClock"></div>
        </div>
      </div>
    </div>

    <div class="overview-card hidden" id="overviewCard">
      <div class="overview-top-bar">
        <div class="month-filter-wrap">
          <button class="btn-month-filter" onclick="toggleMonthDropdown()">&#128197; FILTER MONTHS <span class="filter-arrow">&#9660;</span></button>
          <div class="month-filter-dropdown hidden" id="monthFilterDropdown">
            <div class="mfd-row">
              <div class="mfd-group"><label class="mfd-label">FROM</label>
                <select class="mfd-select" id="fromMonth"><option value="0">January</option><option value="1">February</option><option value="2">March</option><option value="3">April</option><option value="4">May</option><option value="5">June</option><option value="6">July</option><option value="7">August</option><option value="8">September</option><option value="9">October</option><option value="10">November</option><option value="11">December</option></select>
              </div>
              <span class="mfd-arrow">&#8594;</span>
              <div class="mfd-group"><label class="mfd-label">TO</label>
                <select class="mfd-select" id="toMonth"><option value="0">January</option><option value="1">February</option><option value="2">March</option><option value="3">April</option><option value="4">May</option><option value="5">June</option><option value="6">July</option><option value="7">August</option><option value="8">September</option><option value="9">October</option><option value="10">November</option><option value="11" selected>December</option></select>
              </div>
            </div>
            <div class="mfd-actions">
              <button class="mfd-btn-apply" onclick="applyMonthFilter()">APPLY</button>
              <button class="mfd-btn-reset" onclick="resetMonthFilter()">RESET</button>
            </div>
          </div>
          <span class="filter-active-pill hidden" id="filterActivePill"></span>
        </div>
        <button class="btn-toggle-back" onclick="toggleMain()">&#9650; BACK TO DETAIL VIEW</button>
      </div>
      <div class="overview-charts-row" id="overviewChartsRow">
        <div class="overview-chart-wrap" id="wrap-bar" onclick="expandChart('wrap-bar')">
          <button class="chart-close-btn" onclick="event.stopPropagation(); collapseChart()">&#10005;</button>
          <canvas id="overviewChart"></canvas>
        </div>
        <div class="overview-chart-wrap" id="wrap-line" onclick="expandChart('wrap-line')">
          <button class="chart-close-btn" onclick="event.stopPropagation(); collapseChart()">&#10005;</button>
          <canvas id="lineChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bottom">
      <button class="btn-home" onclick="location.href='../../index.html'">
        <span class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        </span>
        <span class="label">HOMEPAGE</span>
      </button>
      <div class="footer-divider"></div>
      <div class="nav-buttons">
        <button class="btn-nav" onclick="location.href='NCMCtithe.html'">NORTH CENTRAL<br/>MINDANAO CONFERENCE</button>
        <button class="btn-nav" onclick="location.href='CMMtithe.html'">CENTRAL<br/>MINDANAO MISSION</button>
        <button class="btn-nav" onclick="location.href='NMMtithe.html'">NORTHEASTERN<br/>MINDANAO MISSION</button>
        <button class="btn-nav active" onclick="location.href='WMCtithe.html'">WESTERN<br/>MINDANAO CONFERENCE</button>
        <button class="btn-nav" onclick="location.href='ZPMtithe.html'">ZAMBOANGA<br/>PENINSULAR MISSION</button>
      </div>
      <a href="https://spucadventist.org" class="footer-link">spucadventist.org</a>
    </div>
  </footer>

  <script>
    initMissionPage({
      canvasId: 'wmcChart',
      labelHeader: 'WMC TITHES',
      data2025:   [21470361.40, 15298976.00, 14811539.90, 19149807.77, 16873462.51, 21203105.61, 18036761.13, 14558798.10, 17601704.97, 17197806.26, 17023040.69, 22382871.58],
      data2026:   [19785800.90, 21100000.20, 18063964.30, null, null, null, null, null, null, null, null, null],
      dataTarget: [22000000, 16000000, 15500000, 20000000, 17500000, 22000000, 19000000, 15500000, 18500000, 18000000, 18000000, 23000000]
    });
  </script>
</body>
</html>
