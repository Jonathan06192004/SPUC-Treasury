<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZPM Offerings | Treasury SPUC</title>
  <link rel="stylesheet" href="../../Styles/Offering/ZPMoffering.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="logo-area" onclick="location.href='../../index.html'" style="cursor:pointer;">
      <img src="../../Assets/logo.png" alt="Logo" class="logo-img"/>
      <div class="org-name">
        <strong>Southwestern Philippine</strong> Union Conference
      </div>
    </div>
    <button class="btn-back" onclick="location.href='../Offering.html'">&#8592; Back</button>
  </header>

  <main>
    <div class="title-row">
      <div class="title-left"></div>
      <p class="page-subtitle">Zamboanga Peninsular Mission</p>
      <h1 class="page-title"><img src="../../Assets/Offerings.png" alt="Offerings" class="page-title-img"/></h1>
    </div>

    <div class="chart-card" id="mainChartCard">
      <div class="chart-table-row">
        <div class="chart-scroll">
          <canvas id="zpmOfferingChart"></canvas>
        </div>
        <div class="right-col">
          <div class="chart-legend" id="chartLegend"></div>
          <div class="excel-table-wrap">
            <table class="excel-table">
              <thead><tr>
                <th class="th-zpm">ZPM</th>
                <th class="th-2025">2025</th>
                <th class="th-2026">2026</th>
                <th class="th-budget">BUDGET</th>
              </tr></thead>
              <tbody id="excelBody"></tbody>
            </table>
          </div>
          <button class="btn-toggle-main" id="toggleMainBtn" onclick="toggleMain()">&#9660; VIEW ALL MONTHS</button>
          <div class="side-clock" id="sideClock"></div>
        </div>
      </div>
    </div>

    <div class="overview-card hidden" id="overviewCard">
      <div class="overview-top-bar">
        <div class="month-filter-wrap">
          <button class="btn-month-filter" onclick="toggleMonthDropdown()">&#128197; FILTER MONTHS <span class="filter-arrow">&#9660;</span></button>
          <div class="month-filter-dropdown hidden" id="monthFilterDropdown">
            <div class="mfd-row">
              <div class="mfd-group"><label class="mfd-label">FROM</label><select class="mfd-select" id="fromMonth"><option value="0">January</option><option value="1">February</option><option value="2">March</option><option value="3">April</option><option value="4">May</option><option value="5">June</option><option value="6">July</option><option value="7">August</option><option value="8">September</option><option value="9">October</option><option value="10">November</option><option value="11">December</option></select></div>
              <span class="mfd-arrow">&#8594;</span>
              <div class="mfd-group"><label class="mfd-label">TO</label><select class="mfd-select" id="toMonth"><option value="0">January</option><option value="1">February</option><option value="2">March</option><option value="3">April</option><option value="4">May</option><option value="5">June</option><option value="6">July</option><option value="7">August</option><option value="8">September</option><option value="9">October</option><option value="10">November</option><option value="11" selected>December</option></select></div>
            </div>
            <div class="mfd-actions"><button class="mfd-btn-apply" onclick="applyMonthFilter()">APPLY</button><button class="mfd-btn-reset" onclick="resetMonthFilter()">RESET</button></div>
          </div>
          <span class="filter-active-pill hidden" id="filterActivePill"></span>
        </div>
        <button class="btn-toggle-back" onclick="toggleMain()">&#9650; BACK TO DETAIL VIEW</button>
      </div>
      <div class="overview-charts-row" id="overviewChartsRow">
        <div class="overview-chart-wrap" id="wrap-bar" onclick="expandChart('wrap-bar')"><button class="chart-close-btn" onclick="event.stopPropagation(); collapseChart()">&#10005;</button><canvas id="overviewChart"></canvas></div>
        <div class="overview-chart-wrap" id="wrap-line" onclick="expandChart('wrap-line')"><button class="chart-close-btn" onclick="event.stopPropagation(); collapseChart()">&#10005;</button><canvas id="lineChart"></canvas></div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bottom">
      <button class="btn-home" onclick="location.href='../../index.html'">
        <span class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        </span>
        <span class="label">HOMEPAGE</span>
      </button>
      <div class="footer-divider"></div>
      <div class="nav-buttons">
        <button class="btn-nav" onclick="location.href='NCMCoffering.html'">NORTH CENTRAL<br/>MINDANAO CONFERENCE</button>
        <button class="btn-nav" onclick="location.href='CMMoffering.html'">CENTRAL<br/>MINDANAO MISSION</button>
        <button class="btn-nav" onclick="location.href='NMMoffering.html'">NORTHEASTERN<br/>MINDANAO MISSION</button>
        <button class="btn-nav" onclick="location.href='WMCoffering.html'">WESTERN<br/>MINDANAO CONFERENCE</button>
        <button class="btn-nav active" onclick="location.href='ZPMoffering.html'">ZAMBOANGA<br/>PENINSULAR MISSION</button>
      </div>
      <a href="https://spucadventist.org" class="footer-link">spucadventist.org</a>
    </div>
  </footer>

  <script>
    const VISIBLE_MONTHS = 4;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const data2025 = [6339754.30, 3996998.33, 3486240.37, 5790837.13, 4194080.67, 5431951.90, 4566993.83, 3316249.03, 4455129.83, 3264997.33, 3396422.50, 4365371.97];
    const data2026 = [4228337.27, null, null, null, null, null, null, null, null, null, null, null];
    const dataTarget = [7000000, 4500000, 4000000, 6500000, 5000000, 6000000, 5000000, 4000000, 5000000, 4000000, 4000000, 5000000];

    const canvas = document.getElementById('zpmOfferingChart');
    const containerWidth = canvas.parentElement.clientWidth;
    const containerHeight = canvas.parentElement.clientHeight;
    const barWidth = containerWidth / VISIBLE_MONTHS;
    canvas.style.width = (barWidth * months.length) + 'px';
    canvas.style.minWidth = (barWidth * months.length) + 'px';
    canvas.style.height = containerHeight + 'px';

    const datasets = [
      { label: '2025', data: data2025, backgroundColor: '#1a237e', borderRadius: 5 },
      { label: '2026', data: data2026, backgroundColor: '#f5a623', borderRadius: 5 },
      { label: 'Budget', data: dataTarget, backgroundColor: '#ef4444', borderRadius: 5 }
    ];

    const chart = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: { labels: months, datasets },
      options: {
        responsive: false,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` } }
        },
        scales: {
          y: { beginAtZero: true, ticks: { callback: v => v >= 1000000 ? '₱' + (v / 1000000).toFixed(1) + 'M' : v >= 1000 ? '₱' + (v / 1000).toFixed(1) + 'K' : '₱' + v, font: { weight: '600', size: 11 }, color: '#ffffff' }, grid: { color: 'rgba(255,255,255,0.5)', lineWidth: 2 } },
          x: { grid: { display: false }, ticks: { font: { weight: '600', size: 11 }, color: '#ffffff' } }
        }
      }
    });

    const legendEl = document.getElementById('chartLegend');
    datasets.forEach((ds, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${ds.backgroundColor}"></span><span class="legend-label">${ds.label}</span>`;
      item.addEventListener('click', () => {
        const meta = chart.getDatasetMeta(i);
        meta.hidden = !meta.hidden;
        item.classList.toggle('legend-hidden');
        chart.update();
      });
      legendEl.appendChild(item);
    });

    const fmt = v => v != null ? '₱' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '-';
    const t2025 = data2025.reduce((a,b) => a+(b||0),0);
    const t2026 = data2026.reduce((a,b) => a+(b||0),0);
    const tBudget = dataTarget.reduce((a,b) => a+(b||0),0);
    document.getElementById('excelBody').innerHTML = months.map((m,i) =>
      `<tr><td class="month-cell">${m}</td><td class="cell-2025">${fmt(data2025[i])}</td><td class="cell-2026">${fmt(data2026[i])}</td><td class="cell-budget">${fmt(dataTarget[i])}</td></tr>`
    ).join('') + `<tr class="total-row"><td class="month-cell">Total</td><td class="total-cell">${fmt(t2025)}</td><td class="total-cell">${fmt(t2026)}</td><td class="total-cell">${fmt(tBudget)}</td></tr>`;

    function updateSideClock() {
      const now = new Date();
      const date = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      let hours = now.getHours(); const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const hh = String(hours).padStart(2,'0'), mm = String(now.getMinutes()).padStart(2,'0'), ss = String(now.getSeconds()).padStart(2,'0');
      document.getElementById('sideClock').innerHTML = `<div class="side-clock-time">${hh}:${mm}:${ss} <span class="side-clock-ampm">${ampm}</span></div><div class="side-clock-date">${date}</div>`;
    }
    updateSideClock(); setInterval(updateSideClock, 1000);

    let overviewChart = null, lineChart = null;

    let activeFrom = 0, activeTo = 11;
    function toggleMonthDropdown() { document.getElementById('monthFilterDropdown').classList.toggle('hidden'); }
    function applyMonthFilter() {
      const from = parseInt(document.getElementById('fromMonth').value);
      const to   = parseInt(document.getElementById('toMonth').value);
      if (from > to) { alert('"From" month cannot be after "To" month.'); return; }
      activeFrom = from; activeTo = to;
      document.getElementById('monthFilterDropdown').classList.add('hidden');
      const pill = document.getElementById('filterActivePill');
      if (from === 0 && to === 11) { pill.classList.add('hidden'); }
      else { pill.textContent = months[from] + (from === to ? '' : ' – ' + months[to]); pill.classList.remove('hidden'); }
      if (overviewChart) { overviewChart.data.labels = months.slice(from,to+1); overviewChart.data.datasets[0].data = data2025.slice(from,to+1); overviewChart.data.datasets[1].data = data2026.slice(from,to+1); overviewChart.data.datasets[2].data = dataTarget.slice(from,to+1); overviewChart.update('active'); }
      if (lineChart) { lineChart.data.labels = months.slice(from,to+1); lineChart.data.datasets[0].data = data2025.slice(from,to+1); lineChart.data.datasets[1].data = data2026.slice(from,to+1); lineChart.data.datasets[2].data = dataTarget.slice(from,to+1); lineChart.update('active'); }
    }
    function resetMonthFilter() { document.getElementById('fromMonth').value='0'; document.getElementById('toMonth').value='11'; applyMonthFilter(); }

    function toggleMain() {
      const mainCard = document.getElementById('mainChartCard');
      const overviewCard = document.getElementById('overviewCard');
      const isOverview = !overviewCard.classList.contains('hidden');
      if (isOverview) {
        overviewCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
        setTimeout(() => { overviewCard.classList.add('hidden'); overviewCard.style.animation = ''; mainCard.classList.remove('hidden'); mainCard.style.animation = 'fadeSlideIn 0.4s ease forwards'; setTimeout(() => mainCard.style.animation = '', 400); }, 300);
      } else {
        mainCard.style.animation = 'fadeSlideOut 0.3s ease forwards';
        setTimeout(() => {
          mainCard.classList.add('hidden'); mainCard.style.animation = '';
          overviewCard.classList.remove('hidden'); overviewCard.style.animation = 'fadeSlideIn 0.4s ease forwards';
          setTimeout(() => overviewCard.style.animation = '', 400);
          if (!overviewChart) {
            overviewChart = new Chart(document.getElementById('overviewChart').getContext('2d'), { type:'bar', data:{ labels:months.slice(activeFrom,activeTo+1), datasets:[{label:'2025',data:data2025.slice(activeFrom,activeTo+1),backgroundColor:'#1a237e',borderRadius:5},{label:'2026',data:data2026.slice(activeFrom,activeTo+1),backgroundColor:'#f5a623',borderRadius:5},{label:'Budget',data:dataTarget.slice(activeFrom,activeTo+1),backgroundColor:'#ef4444',borderRadius:5}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{color:'#fff',font:{weight:'700',size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v>=1000000?'₱'+(v/1000000).toFixed(1)+'M':'₱'+v,font:{weight:'700',size:11},color:'#fff'},grid:{color:'rgba(255,255,255,0.3)'}},x:{grid:{display:false},ticks:{font:{weight:'700',size:11},color:'#fff'}}}} });
          }
          if (!lineChart) {
            lineChart = new Chart(document.getElementById('lineChart').getContext('2d'), { type:'line', data:{ labels:months.slice(activeFrom,activeTo+1), datasets:[{label:'2025',data:data2025.slice(activeFrom,activeTo+1),borderColor:'#4f7cff',backgroundColor:'rgba(79,124,255,0.15)',pointBackgroundColor:'#4f7cff',tension:0.4,fill:true,pointRadius:4},{label:'2026',data:data2026.slice(activeFrom,activeTo+1),borderColor:'#f5a623',backgroundColor:'rgba(245,166,35,0.15)',pointBackgroundColor:'#f5a623',tension:0.4,fill:true,pointRadius:4},{label:'Budget',data:dataTarget.slice(activeFrom,activeTo+1),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.1)',pointBackgroundColor:'#ef4444',tension:0.4,fill:false,borderDash:[6,3],pointRadius:4}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{color:'#fff',font:{weight:'700',size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ₱${ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v>=1000000?'₱'+(v/1000000).toFixed(1)+'M':'₱'+v,font:{weight:'700',size:11},color:'#fff'},grid:{color:'rgba(255,255,255,0.3)'}},x:{grid:{color:'rgba(255,255,255,0.1)'},ticks:{font:{weight:'700',size:11},color:'#fff'}}}} });
          }
        }, 300);
      }
    }

    let expandedWrap = null;
    function expandChart(wrapId) {
      if (expandedWrap === wrapId) { collapseChart(); return; }
      expandedWrap = wrapId;
      document.querySelectorAll('.overview-chart-wrap').forEach(w => {
        if (w.id === wrapId) { w.classList.add('chart-expanded'); w.classList.remove('chart-shrunk'); w.querySelector('.chart-close-btn').classList.add('visible'); }
        else { w.classList.add('chart-shrunk'); w.classList.remove('chart-expanded'); w.querySelector('.chart-close-btn').classList.remove('visible'); }
      });
      setTimeout(() => [overviewChart, lineChart].forEach(c => c && c.resize()), 380);
    }
    function collapseChart() {
      expandedWrap = null;
      document.querySelectorAll('.overview-chart-wrap').forEach(w => { w.classList.remove('chart-expanded','chart-shrunk'); w.querySelector('.chart-close-btn').classList.remove('visible'); });
      setTimeout(() => [overviewChart, lineChart].forEach(c => c && c.resize()), 380);
    }
  </script>
</body>
</html>
