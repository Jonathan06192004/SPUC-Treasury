<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Treasury SPUC</title>
  <link rel="icon" type="image/png" href="Assets/logo.png"/>
  <link rel="stylesheet" href="Styles/index.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <img src="Assets/logo.png" alt="Logo"/>
      <div class="login-org">
        <strong>Southwestern Philippines</strong> Union Conference
      </div>
    </div>

    <img src="Assets/Treasury Dep.png" alt="Treasury Department" class="login-title-img"/>

    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>USERNAME</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="off" required/>
      </div>
      <div class="input-group">
        <label>PASSWORD</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Enter password" required/>
          <button type="button" class="toggle-pw" onclick="togglePassword()">👁</button>
        </div>
      </div>
      <p class="login-error hidden" id="loginError">Invalid username or password.</p>
      <button type="submit" class="btn-login">LOGIN</button>
    </form>

    <a href="https://spucadventist.org" class="login-footer-link">spucadventist.org</a>
  </div>

  <script>
    function getCreds() {
      return {
        username: localStorage.getItem('spuc_username') || 'admin',
        password: localStorage.getItem('spuc_password') || 'admin'
      };
    }

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const err  = document.getElementById('loginError');
      const creds = getCreds();
      if (user === creds.username && pass === creds.password) {
        sessionStorage.setItem('spuc_session_start', new Date().toISOString());
        location.href = 'Pages/HomePage.html';
      } else {
        err.classList.remove('hidden');
        document.getElementById('password').value = '';
      }
    }

    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
